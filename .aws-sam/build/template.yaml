AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'smartovate-api Sample SAM Template for smartovate-api

  '
Globals:
  Function:
    Timeout: 3
Resources:
  CatalogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CatalogTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: HelloWorldFunction
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
      - x86_64
      Environment:
        Variables:
          TABLE_NAME:
            Ref: CatalogTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: CatalogTable
      Events:
        HelloWorld:
          Type: Api
          Properties:
            Path: /hello
            Method: get
    Metadata:
      SamResourceId: HelloWorldFunction
  CreateServiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: CreateServiceFunction
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
      - x86_64
      Environment:
        Variables:
          TABLE_NAME:
            Ref: CatalogTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: CatalogTable
      Events:
        CreateServiceEvent:
          Type: Api
          Properties:
            Path: /services
            Method: post
    Metadata:
      SamResourceId: CreateServiceFunction
  GetServicesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetServicesFunction
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
      - x86_64
      Environment:
        Variables:
          TABLE_NAME:
            Ref: CatalogTable
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: CatalogTable
      Events:
        GetServicesEvent:
          Type: Api
          Properties:
            Path: /services
            Method: get
    Metadata:
      SamResourceId: GetServicesFunction
